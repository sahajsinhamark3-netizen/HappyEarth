<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>행복한지구 · Happy Earth — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --night-0:#04060f;
  --night-1:#0a1128;
  --night-2:#111b3e;
  --aurora-green:#52ffc4;
  --aurora-blue:#38c8ff;
  --aurora-violet:#8b6cff;
  --dawn:#ffb46b;
  --ink:#e9efff;
  --ink-dim:#8fa0c9;
  --line:rgba(140,160,220,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Gowun Dodum','Space Grotesk',sans-serif;
  background:var(--night-0);
  color:var(--ink);
  overflow-x:hidden;
  min-height:100vh;
  position:relative;
}

/* ---------- SKY ---------- */
.sky{position:fixed;inset:0;z-index:0;overflow:hidden;
  background:
    radial-gradient(120% 90% at 50% 115%, #14304a 0%, transparent 55%),
    linear-gradient(180deg, var(--night-0) 0%, var(--night-1) 55%, var(--night-2) 100%);
}
/* aurora curtains */
.aurora{position:absolute;inset:-20%;filter:blur(60px);mix-blend-mode:screen;opacity:.75}
.aurora span{position:absolute;width:60vw;height:130vh;border-radius:45%;
  transform-origin:50% 100%;
  animation:sway 16s ease-in-out infinite;}
.aurora span:nth-child(1){left:-5%;top:-30%;background:linear-gradient(180deg,transparent,var(--aurora-green) 45%,transparent 85%);animation-delay:0s}
.aurora span:nth-child(2){left:28%;top:-40%;background:linear-gradient(180deg,transparent,var(--aurora-blue) 40%,transparent 85%);animation-delay:-5s;animation-duration:20s}
.aurora span:nth-child(3){right:-8%;top:-32%;background:linear-gradient(180deg,transparent,var(--aurora-violet) 45%,transparent 85%);animation-delay:-9s;animation-duration:18s}
@keyframes sway{
  0%,100%{transform:rotate(-7deg) scaleX(1)}
  50%{transform:rotate(7deg) scaleX(1.25)}
}
/* stars + shooting star */
#stars{position:absolute;inset:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.95}}
.shooter{position:absolute;width:140px;height:2px;border-radius:2px;
  background:linear-gradient(90deg,#fff,transparent);
  transform:rotate(-30deg);opacity:0;
  animation:shoot 7s linear infinite;}
.shooter.s2{animation-delay:3.6s;top:12%!important;left:70%!important}
@keyframes shoot{
  0%,88%{opacity:0;transform:translate(0,0) rotate(-30deg)}
  90%{opacity:1}
  100%{opacity:0;transform:translate(-46vw,26vw) rotate(-30deg)}
}

/* ---------- ORBIT EARTH (signature) ---------- */
.orbit-wrap{position:relative;width:200px;height:200px;margin:0 auto 8px;animation:rise .9s .15s both}
.earth{position:absolute;inset:30px;border-radius:50%;overflow:hidden;
  background:radial-gradient(circle at 34% 30%, #2f9dff 0%, #1250c8 55%, #081a52 100%);
  box-shadow:
    0 0 46px rgba(56,200,255,.45),
    0 0 110px rgba(82,255,196,.22);
  animation:breathe 5s ease-in-out infinite;
}
/* rotating continents — wide repeating map scrolled across the globe */
.earth .land{position:absolute;inset:0;
  background-image:
    radial-gradient(ellipse 26% 18% at 12% 32%, #3fd98a 0%, #2aa968 60%, transparent 72%),
    radial-gradient(ellipse 20% 26% at 34% 62%, #35c47d 0%, #23955c 55%, transparent 70%),
    radial-gradient(ellipse 30% 14% at 58% 26%, #46e296 0%, #2aa968 55%, transparent 72%),
    radial-gradient(ellipse 16% 20% at 78% 58%, #35c47d 0%, transparent 68%),
    radial-gradient(ellipse 22% 12% at 94% 36%, #3fd98a 0%, transparent 70%),
    radial-gradient(ellipse 34% 10% at 46% 88%, #b8f5ff 0%, rgba(184,245,255,.5) 50%, transparent 75%),
    radial-gradient(ellipse 30% 9% at 60% 6%, #d8fbff 0%, rgba(216,251,255,.55) 50%, transparent 75%);
  background-size:200% 100%;background-repeat:repeat-x;
  animation:rotateMap 22s linear infinite;
  filter:saturate(1.1);
}
@keyframes rotateMap{to{background-position-x:-200%}}
/* drifting cloud layer */
.earth .clouds{position:absolute;inset:0;opacity:.75;filter:blur(1.5px);
  background-image:
    radial-gradient(ellipse 24% 8% at 20% 24%, rgba(255,255,255,.85) 0%, transparent 70%),
    radial-gradient(ellipse 30% 7% at 55% 48%, rgba(255,255,255,.7) 0%, transparent 70%),
    radial-gradient(ellipse 20% 6% at 82% 30%, rgba(255,255,255,.75) 0%, transparent 70%),
    radial-gradient(ellipse 26% 7% at 38% 74%, rgba(255,255,255,.65) 0%, transparent 70%),
    radial-gradient(ellipse 18% 5% at 92% 66%, rgba(255,255,255,.6) 0%, transparent 70%);
  background-size:200% 100%;background-repeat:repeat-x;
  animation:rotateMap 34s linear infinite;
}
/* day-night terminator + specular highlight */
.earth .shade{position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(circle at 30% 26%, rgba(255,255,255,.45) 0%, transparent 22%),
    radial-gradient(circle at 74% 76%, rgba(2,6,30,.85) 0%, rgba(2,6,30,.45) 40%, transparent 68%);
  mix-blend-mode:normal;}
/* thin atmosphere rim */
.earth::after{content:"";position:absolute;inset:0;border-radius:50%;
  box-shadow:
    inset 0 0 14px rgba(140,230,255,.8),
    inset -12px -10px 30px rgba(2,6,30,.7);}
.atmo{position:absolute;inset:26px;border-radius:50%;pointer-events:none;
  box-shadow:0 0 22px 6px rgba(122,224,255,.28);
  animation:breathe 5s ease-in-out infinite;}
@keyframes breathe{50%{transform:scale(1.045)}}
.ring{position:absolute;inset:0;border-radius:50%;
  border:1px dashed rgba(150,170,230,.4);
  animation:spin 14s linear infinite;}
.ring .sat{position:absolute;top:-6px;left:calc(50% - 6px);width:12px;height:12px;border-radius:50%;
  background:var(--dawn);box-shadow:0 0 14px var(--dawn),0 0 34px rgba(255,180,107,.6)}
.ring.r2{inset:-22px;border-color:rgba(150,170,230,.22);animation-duration:26s;animation-direction:reverse}
.ring.r2 .sat{width:8px;height:8px;background:var(--aurora-green);box-shadow:0 0 12px var(--aurora-green)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- LAYOUT ---------- */
main{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:56px 20px 40px;gap:0}
.eyebrow{display:inline-flex;align-items:center;gap:10px;
  font-family:'Space Grotesk';font-size:.78rem;letter-spacing:.42em;text-transform:uppercase;
  color:var(--aurora-green);border:1px solid var(--line);border-radius:999px;
  padding:9px 20px 9px 24px;background:rgba(10,20,45,.5);backdrop-filter:blur(8px);
  animation:rise .8s .05s both;margin-bottom:26px}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--aurora-green);
  box-shadow:0 0 10px var(--aurora-green);animation:twinkle 1.8s ease-in-out infinite}

h1{font-family:'Black Han Sans',sans-serif;font-weight:400;
  font-size:clamp(3.4rem,11vw,7.5rem);line-height:1.04;letter-spacing:.01em;margin:6px 0 2px}
h1 .ch{display:inline-block;opacity:0;transform:translateY(46px) rotate(4deg);
  animation:pop .7s cubic-bezier(.2,.9,.3,1.2) both;
  background:linear-gradient(150deg,#fff 15%,var(--aurora-green) 48%,var(--aurora-blue) 72%,var(--aurora-violet) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 60px rgba(82,255,196,.0);}
@keyframes pop{to{opacity:1;transform:none}}
.h-sub{font-family:'Space Grotesk';font-weight:500;font-size:clamp(.95rem,2.4vw,1.3rem);
  letter-spacing:.55em;text-transform:uppercase;color:var(--ink-dim);
  margin:14px 0 22px;animation:rise .8s .9s both}
.h-sub b{color:var(--dawn);font-weight:700}

/* fireflies rising from the bottom */
.fly{position:absolute;bottom:-10px;border-radius:50%;
  background:radial-gradient(circle,var(--c) 0%,transparent 70%);
  animation:floatUp var(--d) linear infinite;animation-delay:var(--dl);opacity:0}
@keyframes floatUp{
  0%{opacity:0;transform:translate(0,0) scale(.6)}
  12%{opacity:.9}
  85%{opacity:.7}
  100%{opacity:0;transform:translate(var(--x),-105vh) scale(1.15)}
}

/* floating hangul words drifting up the sky */
.word{position:absolute;bottom:-8vh;font-family:'Gowun Dodum';
  color:var(--c);opacity:0;white-space:nowrap;
  text-shadow:0 0 18px var(--c);
  animation:wordUp var(--d) linear infinite;animation-delay:var(--dl)}
@keyframes wordUp{
  0%{opacity:0;transform:translateY(0) rotate(-4deg)}
  10%{opacity:.55}
  80%{opacity:.4}
  100%{opacity:0;transform:translateY(-115vh) rotate(5deg)}
}

/* pulsing halo behind the headline */
.halo{position:absolute;left:50%;top:44%;width:min(70vw,560px);aspect-ratio:1;
  transform:translate(-50%,-50%);border-radius:50%;z-index:-1;
  background:radial-gradient(circle,rgba(82,255,196,.16) 0%,rgba(56,200,255,.08) 40%,transparent 70%);
  animation:haloPulse 6s ease-in-out infinite;filter:blur(6px)}
@keyframes haloPulse{50%{transform:translate(-50%,-50%) scale(1.18);opacity:.7}}

/* shimmering sweep across the sub line */
.h-sub{position:relative;overflow:hidden}
.h-sub::after{content:"";position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.55) 50%,transparent 60%);
  transform:translateX(-120%);animation:sheen 4.5s ease-in-out 2s infinite}
@keyframes sheen{0%{transform:translateX(-120%)}45%,100%{transform:translateX(120%)}}

/* marquee */
.marquee{position:relative;z-index:2;overflow:hidden;border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);background:rgba(6,10,26,.6);backdrop-filter:blur(8px);
  padding:14px 0;margin-top:auto}
.track{display:flex;gap:56px;width:max-content;animation:scroll 26s linear infinite;
  font-family:'Space Grotesk';letter-spacing:.28em;font-size:.82rem;text-transform:uppercase;color:var(--ink-dim)}
.track em{font-style:normal;color:var(--dawn)}
@keyframes scroll{to{transform:translateX(-50%)}}
.marquee:hover .track{animation-play-state:paused}

footer{position:relative;z-index:2;text-align:center;padding:20px 16px 26px;
  color:#5f6f97;font-size:.85rem;letter-spacing:.06em}
footer span{color:var(--aurora-green)}

@keyframes rise{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

@media (max-width:560px){
  .orbit-wrap{width:150px;height:150px}
  .earth{inset:24px}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition:none!important}
  .ch{opacity:1;transform:none}
}
</style>
</head>
<body>

<div class="sky" id="sky">
  <div class="aurora"><span></span><span></span><span></span></div>
  <div id="stars"></div>
  <div class="shooter" style="top:18%;left:60%"></div>
  <div class="shooter s2"></div>
</div>

<main>
  <div class="halo"></div>
  <div class="eyebrow"><span class="dot"></span> 준비 중입니다 · In Preparation</div>

  <div class="orbit-wrap" id="parallax">
    <div class="ring r2"><span class="sat"></span></div>
    <div class="ring"><span class="sat"></span></div>
    <div class="atmo"></div>
    <div class="earth">
      <div class="land"></div>
      <div class="clouds"></div>
      <div class="shade"></div>
    </div>
  </div>

  <h1 id="title">행복한지구</h1>
  <div class="h-sub">HAPPY EARTH · <b>곧 만나요</b></div>
</main>

<div class="marquee" aria-hidden="true">
  <div class="track" id="track">
    <span>행복한지구 <em>·</em> HAPPY EARTH <em>·</em> 곧 만나요 <em>·</em> SEE YOU SOON <em>·</em> 지구를 지켜요 <em>·</em> PROTECT THE EARTH <em>·</em> 함께해요 <em>·</em> JOIN US <em>·</em></span>
  </div>
</div>

<footer>© 2026 행복한지구 <span>Happy Earth</span> · Built with 💚 in Korea</footer>

<script>
// starfield
const stars=document.getElementById('stars');
for(let i=0;i<110;i++){
  const s=document.createElement('div');s.className='star';
  const size=Math.random()*2+0.6;
  s.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1.5).toFixed(2)}s;animation-delay:${(Math.random()*3).toFixed(2)}s`;
  stars.appendChild(s);
}

// split headline into animated characters
const t=document.getElementById('title');
t.innerHTML=[...t.textContent].map((c,i)=>`<span class="ch" style="animation-delay:${.35+i*.12}s">${c}</span>`).join('');

// fireflies rising from the bottom
const sky=document.getElementById('sky');
const flyColors=['#52ffc4','#38c8ff','#ffb46b','#8b6cff'];
for(let i=0;i<26;i++){
  const f=document.createElement('div');f.className='fly';
  const size=(Math.random()*5+3).toFixed(1);
  f.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;--c:${flyColors[i%4]};--d:${(Math.random()*8+8).toFixed(1)}s;--dl:${(Math.random()*10).toFixed(1)}s;--x:${(Math.random()*120-60).toFixed(0)}px`;
  sky.appendChild(f);
}

// floating hangul words drifting through the sky
const words=['행복','사랑','평화','지구','함께','희망','자연','미래'];
words.forEach((w,i)=>{
  const el=document.createElement('div');el.className='word';el.textContent=w;
  el.style.cssText=`left:${6+i*12}%;font-size:${(Math.random()*.9+.9).toFixed(2)}rem;--c:${flyColors[i%4]};--d:${(Math.random()*10+16).toFixed(1)}s;--dl:${(i*2.3).toFixed(1)}s`;
  sky.appendChild(el);
});

// duplicate marquee for seamless loop
const track=document.getElementById('track');
track.innerHTML+=track.innerHTML;

// gentle mouse parallax on the planet
const p=document.getElementById('parallax');
addEventListener('pointermove',ev=>{
  if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  const x=(ev.clientX/innerWidth-.5)*14,y=(ev.clientY/innerHeight-.5)*14;
  p.style.transform=`translate(${x}px,${y}px)`;
});
</script>
</body>
</html>
