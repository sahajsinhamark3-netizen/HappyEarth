<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>행복한지구 | Coming Soon</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#020617,#07142e,#10284e,#081120);background-size:400% 400%;animation:bg 15s ease infinite;color:#fff}body:before,body:after{content:"";position:absolute;border-radius:50%;filter:blur(100px);opacity:.45;animation:float 10s ease-in-out infinite}body:before{width:320px;height:320px;background:#00d4ff;top:-80px;left:-80px}body:after{width:380px;height:380px;background:#7c3aed;bottom:-120px;right:-120px;animation-delay:2s}.stars{position:absolute;inset:0;background-image:radial-gradient(white 1px,transparent 1px);background-size:55px 55px;opacity:.2;animation:move 45s linear infinite}.card{position:relative;padding:60px;width:min(90%,800px);border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border-radius:28px;text-align:center;box-shadow:0 0 50px rgba(0,0,0,.35);animation:card 1s ease}.logo{width:110px;height:110px;margin:auto;border-radius:50%;background:linear-gradient(135deg,#00e5ff,#7c3aed);display:grid;place-items:center;font-size:44px;box-shadow:0 0 40px #00d4ff;animation:pulse 3s infinite}h1{margin:30px 0 10px;font-size:clamp(3rem,6vw,5rem);font-weight:900;background:linear-gradient(90deg,#fff,#8be9ff,#b388ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}h2{font-weight:500;color:#74e6ff;margin-bottom:20px;letter-spacing:3px;animation:blink 2s infinite alternate}p{color:#d6e7ff;line-height:1.9;font-size:1.15rem;max-width:620px;margin:auto}.btn{display:inline-block;margin-top:35px;padding:16px 36px;border-radius:999px;text-decoration:none;font-weight:700;color:#06121f;background:linear-gradient(90deg,#00d4ff,#67ffb3);transition:.35s}.btn:hover{transform:translateY(-6px) scale(1.05);box-shadow:0 15px 40px rgba(0,212,255,.5)}footer{margin-top:40px;opacity:.7;font-size:.9rem}@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}@keyframes float{50%{transform:translateY(40px) translateX(20px) scale(1.15)}}@keyframes move{from{transform:translateY(0)}to{transform:translateY(55px)}}@keyframes card{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:none}}@keyframes pulse{50%{transform:scale(1.08);box-shadow:0 0 70px #00d4ff}}@keyframes blink{to{opacity:.6}}</style></head><body><div class="stars"></div><div class="card"><div class="logo">🌍</div><h1>행복한지구</h1><h2>COMING SOON</h2><p>A new digital experience is on the horizon.<br>We're crafting something modern, beautiful and meaningful.<br>See you very soon.</p><a class="btn" href="#">Stay Tuned 🚀</a><footer>© 2026 Happy Earth • Built with ❤️</footer></div></body></html>
